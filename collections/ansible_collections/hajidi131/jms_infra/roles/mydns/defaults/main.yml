# =====================================================================
# 파일 위치 : roles/mydns/defaults/main.yml
# 역할      : mydns 역할에서 사용하는 기본 변수를 정의하는 파일.
#             우선순위가 가장 약해서 group_vars, host_vars, -e 옵션으로
#             언제든지 덮어쓸 수 있음. "기본값이지, 강제가 아니야" 의미.
# =====================================================================
---
# BIND 설치에 필요한 패키지 목록
# bind      = named 데몬 본체 (DNS 서버)
# bind-utils = dig, nslookup 등 DNS 질의 도구
pkgs: [bind, bind-utils]

# 시작하고 부팅 시 자동실행(enable)할 서비스 이름
svcs: [named]

# BIND 메인 설정 파일 경로
# tasks/main.yml 의 "Deploy main config" 태스크가 이 경로에 named.conf.j2 를 배포
named_conf: /etc/named.conf

# 존(zone) 등록 파일 경로
# example.com 정방향/역방향 존을 named 에 등록하는 파일
# tasks/main.yml 의 "Register zones" 태스크가 이 경로에 named.rfc1912.zones.j2 를 배포
zones_conf: /etc/named.rfc1912.zones

# 존 파일이 저장되는 디렉토리
# forward_zone_file, reverse_zone_file 이 이 경로 아래에 배포됨
named_dir: /var/named

# 정방향 존 파일 이름 (도메인 → IP)
# 실제 배포 경로 = /var/named/example.zone
# A 레코드(이름→IP), MX 레코드(메일서버), NS 레코드(네임서버) 가 들어감
forward_zone_file: example.zone

# 역방향 존 파일 이름 (IP → 도메인)
# 실제 배포 경로 = /var/named/example.rev
# PTR 레코드(IP→이름) 가 들어감 (nslookup 192.168.30.10 같은 역방향 질의에 사용)
reverse_zone_file: example.rev