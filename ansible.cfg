[defaults]
inventory = ./inventory/hosts
remote_user = ansible
host_key_checking = false
forks = 10
collections_path = ./collections
roles_path = ./collections/ansible_collections/hajidi131/jms_infra/roles:roles
stdout_callback = default

[privilege_escalation]
become = true
become_method = sudo
become_user = root
become_ask_pass = false